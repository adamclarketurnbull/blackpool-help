<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackpool Help — Community Services Directory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *:focus-visible { outline: 2px solid #f59e0b; outline-offset: 3px; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen">

  <!-- NAV -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur border-b border-slate-800">
    <nav class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between" aria-label="Main navigation">
      <a href="#home" class="font-bold text-lg text-white tracking-tight">
        Blackpool <span class="text-amber-400">Help</span>
      </a>
      <div class="flex gap-4 text-sm">
        <a href="#home"    class="text-slate-300 hover:text-white transition-colors" id="nav-home">Open Now</a>
        <a href="#directory" class="text-slate-300 hover:text-white transition-colors" id="nav-directory">Directory</a>
        <a href="#suggest"   class="text-slate-300 hover:text-white transition-colors" id="nav-suggest">Suggest</a>
      </div>
    </nav>
  </header>

  <main class="pt-14">

    <!-- HOME SECTION -->
    <section id="home" class="max-w-2xl mx-auto px-4 py-6">
      <div id="clock" class="text-center mb-6">
        <p class="text-3xl font-bold text-white" id="clock-time">--:--</p>
        <p class="text-slate-400 text-sm" id="clock-day">Loading...</p>
      </div>
      <div id="filter-bar-home" class="flex gap-2 overflow-x-auto pb-2 mb-4 sticky top-14 bg-slate-900 py-2 z-10"></div>
      <div id="cards-home" class="flex flex-col gap-4"></div>
    </section>

    <!-- DIRECTORY SECTION -->
    <section id="directory" class="max-w-2xl mx-auto px-4 py-6 hidden">
      <h1 class="text-2xl font-bold text-white mb-2">Full Directory</h1>
      <p class="text-slate-400 text-sm mb-4">All services — open or closed. Amber flag = info may be outdated.</p>
      <div id="filter-bar-directory" class="flex gap-2 overflow-x-auto pb-2 mb-4 sticky top-14 bg-slate-900 py-2 z-10"></div>
      <div id="cards-directory" class="flex flex-col gap-4"></div>
    </section>

    <!-- SUGGEST SECTION -->
    <section id="suggest" class="max-w-2xl mx-auto px-4 py-6 hidden">
      <h1 class="text-2xl font-bold text-white mb-2">Suggest a Listing</h1>
      <p class="text-slate-400 text-sm mb-6">Know a service we're missing? Tell us and we'll verify and add it.</p>
      <form id="suggest-form" class="flex flex-col gap-4">
        <div class="flex flex-col gap-1">
          <label for="svc-name" class="text-sm font-medium text-slate-300">Service name <span class="text-amber-400">*</span></label>
          <input type="text" id="svc-name" name="service_name" required
            class="rounded-lg bg-slate-800 border border-slate-600 text-white px-3 py-2 text-sm focus:border-amber-500 outline-none transition-colors" />
        </div>

        <div class="flex flex-col gap-1">
          <label for="svc-category" class="text-sm font-medium text-slate-300">Category <span class="text-amber-400">*</span></label>
          <select id="svc-category" name="category" required
            class="rounded-lg bg-slate-800 border border-slate-600 text-white px-3 py-2 text-sm focus:border-amber-500 outline-none transition-colors">
            <option value="">Select a category</option>
            <option value="food">Food</option>
            <option value="shelter">Shelter</option>
            <option value="outreach">Outreach</option>
            <option value="addiction">Addiction Support</option>
            <option value="clothing">Clothing</option>
            <option value="family">Family</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="flex flex-col gap-1">
          <label for="svc-offer" class="text-sm font-medium text-slate-300">What they offer</label>
          <input type="text" id="svc-offer" name="what_they_offer"
            placeholder="e.g. hot food, showers, laundry"
            class="rounded-lg bg-slate-800 border border-slate-600 text-white px-3 py-2 text-sm focus:border-amber-500 outline-none transition-colors" />
        </div>

        <div class="flex flex-col gap-1">
          <label for="svc-address" class="text-sm font-medium text-slate-300">Address</label>
          <input type="text" id="svc-address" name="address"
            class="rounded-lg bg-slate-800 border border-slate-600 text-white px-3 py-2 text-sm focus:border-amber-500 outline-none transition-colors" />
        </div>

        <div class="flex flex-col gap-1">
          <label for="svc-phone" class="text-sm font-medium text-slate-300">Phone number</label>
          <input type="tel" id="svc-phone" name="phone"
            class="rounded-lg bg-slate-800 border border-slate-600 text-white px-3 py-2 text-sm focus:border-amber-500 outline-none transition-colors" />
        </div>

        <div class="flex flex-col gap-1">
          <label for="svc-hours" class="text-sm font-medium text-slate-300">Opening hours</label>
          <textarea id="svc-hours" name="opening_hours" rows="2"
            placeholder="e.g. Mon–Fri 10am–1pm, Sat 9am–12pm"
            class="rounded-lg bg-slate-800 border border-slate-600 text-white px-3 py-2 text-sm focus:border-amber-500 outline-none transition-colors resize-none"></textarea>
        </div>

        <div class="flex flex-col gap-1">
          <label for="svc-contact" class="text-sm font-medium text-slate-300">Your contact (so we can verify) <span class="text-amber-400">*</span></label>
          <input type="text" id="svc-contact" name="submitter_contact" required
            placeholder="Name, phone, or email"
            class="rounded-lg bg-slate-800 border border-slate-600 text-white px-3 py-2 text-sm focus:border-amber-500 outline-none transition-colors" />
        </div>

        <div id="form-status" class="hidden text-sm rounded-lg px-3 py-2"></div>

        <button type="submit"
          class="w-full rounded-lg bg-amber-500 hover:bg-amber-400 text-slate-900 font-semibold py-3 text-sm transition-colors">
          Submit suggestion
        </button>
      </form>
    </section>

  </main>

  <script src="data.js"></script>
  <script src="logic.js"></script>
  <script src="app.js"></script>
</body>
</html>
